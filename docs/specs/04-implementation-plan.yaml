# Workless V1 — Implementation Plan
# Phase 6 of Spec Pipeline
# Author: Aria (@architect)
# Date: 2026-05-07
# Mode: YOLO

project_id: workless-v1
phase: 6_implementation_plan
planner: Aria (@architect)
input:
  - 02-spec.md
  - 03-critique.json

# ============================================================
# EXECUTION STRATEGY
# ============================================================
execution_strategy:
  approach: linear_serial
  rationale: |
    Site V1 single page com 10 stories. Dependências curtas: setup
    bloqueia tudo, layout base bloqueia seções. Execução em sequência
    é mais simples que waves paralelas pra escopo deste tamanho.
  total_estimated_duration: 3-5 dias úteis
  total_effort_estimate: 30-50 hours

# ============================================================
# STORIES (10 — uma por componente/seção/integração)
# ============================================================
stories:
  - id: WS.1
    title: Setup repo + Next.js scaffold + Design Tokens
    fr_mapped: [Setup técnico (não FR direto)]
    description: |
      Cria estrutura monorepo similar ao JNC (root + apps/web).
      Next.js 14 App Router + Tailwind + TypeScript + Manrope.
      Copia globals.css do JNC e ADAPTA paleta pra Workless
      (verde-elétrico #00D9A3 + grafite + dark-first).
      Cria tailwind.config.ts com tokens.
      Cria layout.tsx + page.tsx mínimo.
      Configura next.config.mjs (output standalone + headers de segurança).
    effort_hours: 3-4
    delegated_to: "@dev"
    dependencies: []
    blocks: [WS.2, WS.3, WS.4, WS.5, WS.6, WS.7, WS.8]
    files_created:
      - "package.json (root + apps/web)"
      - "apps/web/app/{layout.tsx, page.tsx, globals.css}"
      - "apps/web/tailwind.config.ts"
      - "apps/web/next.config.mjs"
      - "apps/web/lib/tokens.ts"
      - "apps/web/tsconfig.json"
      - ".gitignore"

  - id: WS.2
    title: Componentes base (Button, Card, Hexagon) + Navbar + Footer
    fr_mapped: [FR-1.1, FR-3.5, FR-5.2, FR-6.3, FR-8]
    description: |
      Cria components/ui/ com Button (primary/secondary), Card (com glass),
      Hexagon (SVG component reutilizável com props size/opacity/density).
      Cria components/layout/Navbar (sticky, transparente→solid no scroll,
      mobile hamburger) e Footer (mínimo: marca + LinkedIn + ano).
    effort_hours: 4-5
    delegated_to: "@dev"
    dependencies: [WS.1]
    blocks: [WS.3, WS.4, WS.5, WS.6, WS.7, WS.8]
    files_created:
      - "apps/web/components/ui/{Button,Card,Hexagon}.tsx"
      - "apps/web/components/layout/{Navbar,Footer}.tsx"

  - id: WS.3
    title: Seção Hero
    fr_mapped: [FR-1.2, FR-1.3, FR-1.4, FR-1.5, FR-1.6, FR-1.7, FR-1.8]
    description: |
      Hero com posicionamento V2 + sub-headline (Promessa V1 3ª pessoa).
      Background: hexágonos translúcidos (3-5% opacidade, density baixa).
      CTA primário botão grande "Agendar conversa de 30 min" → Calendly.
      Link secundário "Ou mande mensagem no WhatsApp".
      Responsivo: mobile hero ocupa 80vh, desktop 70vh.
    effort_hours: 3-4
    delegated_to: "@dev"
    dependencies: [WS.2]
    blocks: []
    files_created:
      - "apps/web/components/sections/Hero.tsx"

  - id: WS.4
    title: Seção "Para quem é"
    fr_mapped: [FR-2]
    description: |
      3 cards de personas com ícone hexagonal outline + frase + dor concreta:
      1. Dono de PME 5-50 funcionários
      2. Gestor cansado de planilha
      3. Empresário com processo repetitivo
      Layout: grid 3-col desktop, stack mobile.
    effort_hours: 2-3
    delegated_to: "@dev"
    dependencies: [WS.2]
    blocks: []
    files_created:
      - "apps/web/components/sections/ParaQuemE.tsx"

  - id: WS.5
    title: Seção "O que entregamos" (3 ofertas)
    fr_mapped: [FR-3]
    description: |
      3 cards de ofertas com hexágono outline grande:
      1. Chatbot WhatsApp + IA — atendimento 24/7
      2. Automação de Operação — planilha vira sistema
      3. SaaS sob medida — sob consulta (sinaliza upsell)
      Cada card: ícone hexagonal + título + 2-3 bullets + faixa de preço Pioneiro.
      Hover: border-color verde-elétrico + sombra suave.
    effort_hours: 3-4
    delegated_to: "@dev"
    dependencies: [WS.2]
    blocks: []
    files_created:
      - "apps/web/components/sections/Ofertas.tsx"

  - id: WS.6
    title: Seção "Como funciona" (3 passos)
    fr_mapped: [FR-4]
    description: |
      3 colunas numeradas: 1. Conversa 30min, 2. Proposta 48h, 3. Automação 4 semanas.
      Linha conectora horizontal (desktop) ou vertical (mobile).
      Cada passo: número grande + título + descrição curta.
    effort_hours: 2-3
    delegated_to: "@dev"
    dependencies: [WS.2]
    blocks: []
    files_created:
      - "apps/web/components/sections/ComoFunciona.tsx"

  - id: WS.7
    title: Seção "Caso real" (JNC anonimizado) + Plano Pioneiro
    fr_mapped: [FR-5, FR-6]
    description: |
      CasoJNC: stats em destaque ("9+ famílias pagantes", "Eval IA 96,67%",
      "6 meses solo com IA orquestrada") + stack badges (Next.js, Prisma,
      PostgreSQL, Anthropic, Cloudflare) + disclaimer NDA.

      PlanoPioneiro: banner destacado "3 vagas com 50% off pros primeiros".
      Indicador escassez: "Vagas restantes: 3 de 3" (hardcoded V1).
      CTA: "Quero ser pioneiro" → Calendly (com UTM).
    effort_hours: 3-4
    delegated_to: "@dev"
    dependencies: [WS.2]
    blocks: []
    files_created:
      - "apps/web/components/sections/CasoJNC.tsx"
      - "apps/web/components/sections/PlanoPioneiro.tsx"

  - id: WS.8
    title: CTA Final + integração Calendly + WhatsApp
    fr_mapped: [FR-7, FR-10.3, FR-10.4]
    description: |
      CTA Final: headline grande "Vamos conversar?" + botão primário grande
      "Agendar conversa de 30 min" + link WhatsApp wa.me/55XXX com mensagem
      pré-preenchida ("Olá! Vim do site da Workless...").
      Calendly: link com UTM (utm_source=site, utm_campaign=v1).
    effort_hours: 1-2
    delegated_to: "@dev"
    dependencies: [WS.2]
    blocks: []
    files_created:
      - "apps/web/components/sections/CtaFinal.tsx"

  - id: WS.9
    title: SEO + Open Graph + Analytics
    fr_mapped: [FR-9, FR-10]
    description: |
      Metadata (title + description) em layout.tsx.
      OG image via opengraph-image.tsx (1200×630, gerada no build).
      Schema.org Organization + LocalBusiness em <Head>.
      Robots.ts + Sitemap.ts gerados pelo Next.js.
      Plausible OU GA4 (decisão final pré-deploy — recomendar Plausible).
      Eventos custom: visit, click_cta_primary, click_cta_secondary, click_pioneiro.
    effort_hours: 2-3
    delegated_to: "@dev"
    dependencies: [WS.3, WS.8]
    blocks: [WS.10]
    files_created:
      - "apps/web/app/opengraph-image.tsx"
      - "apps/web/app/robots.ts"
      - "apps/web/app/sitemap.ts"
      - "apps/web/lib/seo.ts"
      - "apps/web/lib/analytics.ts"

  - id: WS.10
    title: Deploy EasyPanel + DNS workless.com.br + repo GitHub
    fr_mapped: [Setup deploy (não FR direto)]
    description: |
      1. Registrar workless.com.br no Registro.br
      2. Criar repo fabiogiroux/workless no GitHub (privado inicialmente)
      3. git init + commit + push pra GitHub
      4. EasyPanel: criar novo serviço Next.js standalone
      5. Configurar webhook GitHub → EasyPanel auto-deploy
      6. DNS Cloudflare: A record + Cloudflare proxy
      7. SSL: automático Cloudflare
      8. Validar: site no ar, lighthouse OK, headers segurança presentes
    effort_hours: 2-4 (depende de tempo de DNS propagar)
    delegated_to: "@devops (Gage)"
    dependencies: [WS.9, gate_qa_passed]
    blocks: []
    files_created:
      - "README.md (setup deploy guide)"

# ============================================================
# CHECKPOINTS
# ============================================================
checkpoints:
  - id: CP-1
    after: WS.1
    type: setup_validation
    duration: 5-10 min
    deliverables:
      - "npm run dev funciona localmente"
      - "Tailwind classes aplicam"
      - "Manrope carregado"

  - id: CP-2
    after: WS.2
    type: components_validation
    duration: 10-15 min
    deliverables:
      - "Botão renderiza com cor primary verde-elétrico"
      - "Card com glass effect funciona"
      - "Hexagon SVG renderiza com props"
      - "Navbar sticky funciona"

  - id: CP-3
    after: WS.3-WS.8
    type: sections_review
    duration: 30 min
    deliverables:
      - "Todas seções renderizam em sequência"
      - "Conteúdo coerente com spec"
      - "Hexágonos aplicados onde especificado"

  - id: CP-4
    after: WS.9
    type: pre_deploy_qa_gate
    duration: 30-45 min
    participants: [Quinn (@qa)]
    deliverables:
      - "Lighthouse mobile ≥ 90 em todas as 4 categorias"
      - "Lighthouse desktop ≥ 95"
      - "FCP ≤ 1.5s, LCP ≤ 2.5s, CLS ≤ 0.1"
      - "Responsivo OK em 3 viewports"
      - "OG image renderiza"
      - "Headers de segurança presentes"
    blocks_deploy: true

  - id: CP-5
    after: WS.10
    type: post_deploy_smoke
    duration: 15 min
    deliverables:
      - "https://workless.com.br responde 200"
      - "SSL válido"
      - "CTA Calendly abre"
      - "WhatsApp link funciona"
      - "OG preview no LinkedIn OK"

# ============================================================
# DEPENDENCIES GRAPH
# ============================================================
dependencies_graph: |
  WS.1 (setup) → bloqueia todas
       ↓
  WS.2 (components) → bloqueia 3-8
       ↓
  ┌────────┬────────┬────────┬────────┬────────┐
  ↓        ↓        ↓        ↓        ↓        ↓
  WS.3   WS.4   WS.5   WS.6   WS.7   WS.8     (paralelizáveis)
       ↓
  WS.9 (SEO + Analytics) — depende de Hero (WS.3) + CTA (WS.8)
       ↓
  CP-4 (QA gate)
       ↓
  WS.10 (deploy)
       ↓
  CP-5 (smoke test)

# ============================================================
# ROLLBACK PROCEDURE
# ============================================================
rollback:
  triggers:
    - lighthouse_below_threshold
    - deploy_failure_easypanel
    - critical_visual_regression
    - dns_propagation_issue
  steps:
    1: "Deploy: revert via EasyPanel UI (rollback ao deploy anterior)"
    2: "Code: git revert HEAD + push (Devops)"
    3: "DNS: remover Cloudflare proxy temporariamente se SSL fail"
    4: "Notificar Fabio + documentar em postmortem"

# ============================================================
# GATES
# ============================================================
gates:
  - name: typecheck
    command: "cd apps/web && npx tsc --noEmit"
    blocks: [build, deploy]
  - name: lint
    command: "cd apps/web && npm run lint"
    blocks: [build, deploy]
    severity: errors block, warnings ok
  - name: build
    command: "cd apps/web && npm run build"
    blocks: [deploy]
  - name: lighthouse_local
    command: "lhci autorun OR manual via Chrome DevTools"
    blocks: [deploy]
    thresholds:
      mobile: ">= 90 in all 4 categories"
      desktop: ">= 95 in all 4 categories"
  - name: visual_review
    type: manual
    blocks: [deploy]
    description: "Fabio aprova visualmente antes do push final pra prod"

